services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - obragest_data:/app/data
      - ./backend/google_client_secret.json:/app/data/google_client_secret.json:ro
    ports:
      - "8000:8000"
      - "8080:8000"
    environment:
      - DEBUG=true
      - PYTHONUNBUFFERED=1
      - WATCHFILES_FORCE_POLLING=true
      - OBRA_GEST_DATA_DIR=/app/data
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - GOOGLE_DRIVE_REDIRECT_URI=http://localhost:8080/google/callback/
      - FRONTEND_URL=http://localhost:3000
      - OAUTHLIB_INSECURE_TRANSPORT=1
    develop:
      watch:
        - path: ./backend/pyproject.toml
          action: rebuild
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - API_PROXY=http://backend:8000
      - CHOKIDAR_USEPOLLING=true
    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
    depends_on:
      backend:
        condition: service_healthy

volumes:
  obragest_data:
  frontend_node_modules:
