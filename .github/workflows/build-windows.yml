name: Build ObraGest.exe

# Triggers when a tag matching v1.0.0, v1.2.3, etc. is pushed.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install `
            "django>=6.0.6" `
            "django-cors-headers>=4.9.0" `
            "djangorestframework>=3.16.0" `
            "google-api-python-client>=2.170.0" `
            "google-auth-oauthlib>=1.2.2" `
            "python-dotenv>=1.2.2" `
            "whitenoise>=6.9.0" `
            pyinstaller `
            waitress `
            pystray `
            pillow

      - name: Collect Django static files
        working-directory: backend
        env:
          OBRA_GEST_DATA_DIR: data
          DEBUG: "false"
          ALLOWED_HOSTS: localhost
          SECRET_KEY: build-temp-key-github-actions
        run: python manage.py collectstatic --noinput

      - name: Build executable with PyInstaller
        working-directory: backend
        run: pyinstaller launcher.spec --clean --noconfirm

      - name: Create release and upload ObraGest.exe
        uses: softprops/action-gh-release@v2
        with:
          name: "ObraGest ${{ github.ref_name }}"
          body: |
            ## ObraGest ${{ github.ref_name }}

            ### Installation
            1. Download `ObraGest.exe` below
            2. Right-click → **Run as administrator**
            3. Wait for the setup window and open **http://obragest.com.br**

            > Data is stored in `C:\Users\<your_user>\ObraGest\data\`
          files: backend/dist/ObraGest.exe
          draft: false
          prerelease: false
