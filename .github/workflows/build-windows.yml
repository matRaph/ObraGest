name: Build ObraGest.exe

# Triggers when a tag matching v1.0.0, v1.2.3, etc. is pushed.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build Windows executable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend dist
        run: |
          if (!(Test-Path "frontend/dist/index.html")) {
            Write-Error "frontend/dist/index.html missing after npm run build"
            exit 1
          }
          Get-ChildItem -Recurse frontend/dist | Select-Object -First 30 FullName

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install `
            "django>=6.0.6" `
            "django-cors-headers>=4.9.0" `
            "djangorestframework>=3.16.0" `
            "google-api-python-client>=2.170.0" `
            "google-auth-oauthlib>=1.2.2" `
            "python-dotenv>=1.2.2" `
            "whitenoise>=6.9.0" `
            pyinstaller `
            waitress `
            pystray `
            pillow

      - name: Collect Django static files
        working-directory: backend
        env:
          OBRA_GEST_DATA_DIR: data
          DEBUG: "false"
          ALLOWED_HOSTS: localhost
          SECRET_KEY: build-temp-key-github-actions
        run: python manage.py collectstatic --noinput

      - name: Write Google OAuth client secrets
        working-directory: backend
        env:
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GOOGLE_CLIENT_SECRET_JSON)) {
            Write-Warning @"
          Secret GOOGLE_CLIENT_SECRET_JSON missing — Google Drive will be unavailable in this build.
          Add the full OAuth client JSON as that repository secret, then re-tag to embed it.
          "@
            exit 0
          }
          # utf8NoBOM avoids a BOM that breaks google-auth JSON parsing
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [IO.File]::WriteAllText(
            (Join-Path (Get-Location) "google_client_secret.json"),
            $env:GOOGLE_CLIENT_SECRET_JSON,
            $utf8
          )
          Write-Host "Wrote google_client_secret.json for bundling."

      - name: Build executable with PyInstaller
        working-directory: backend
        shell: pwsh
        run: |
          if (Test-Path "google_client_secret.json") {
            Write-Host "Bundling google_client_secret.json into ObraGest"
          } else {
            Write-Warning "google_client_secret.json absent — build will ship without embedded Google OAuth"
          }
          pyinstaller launcher.spec --clean --noconfirm
          if (!(Test-Path "dist/ObraGest/ObraGest.exe")) {
            Write-Error "dist/ObraGest/ObraGest.exe not found"
            exit 1
          }
          $zipName = "ObraGest_${{ github.ref_name }}.zip"
          if (Test-Path "dist/$zipName") { Remove-Item "dist/$zipName" -Force }
          Compress-Archive -Path "dist/ObraGest" -DestinationPath "dist/$zipName" -Force
          Write-Host "Created dist/$zipName"

      - name: Sign executable (Authenticode)
        working-directory: backend
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $exe = "dist/ObraGest/ObraGest.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Executable not found: $exe"
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)) {
            Write-Warning @"
          Code signing secrets missing — publishing UNSIGNED build.
          Windows SmartScreen may block it. To sign, add:
            - WINDOWS_CERT_BASE64
            - WINDOWS_CERT_PASSWORD
          See README.md section 'Release Windows'.
          "@
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "obragest-codesign.pfx"
          try {
            $bytes = [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
            [IO.File]::WriteAllBytes($pfxPath, $bytes)

            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
              -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
              Sort-Object { $_.Directory.Name } -Descending |
              Select-Object -First 1 -ExpandProperty FullName

            if (-not $signtool) {
              Write-Error "signtool.exe not found. Windows SDK missing on runner."
              exit 1
            }

            Write-Host "Using signtool: $signtool"
            & $signtool sign `
              /f $pfxPath `
              /p $env:WINDOWS_CERT_PASSWORD `
              /fd SHA256 `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              /v `
              $exe
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            & $signtool verify /pa /v $exe
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            Write-Host "Signed successfully: $exe"

            $zipName = "ObraGest_${{ github.ref_name }}.zip"
            Remove-Item "dist/$zipName" -Force -ErrorAction SilentlyContinue
            Compress-Archive -Path "dist/ObraGest" -DestinationPath "dist/$zipName" -Force
          }
          finally {
            if (Test-Path $pfxPath) { Remove-Item $pfxPath -Force }
          }

      - name: Create release and upload ObraGest
        uses: softprops/action-gh-release@v2
        with:
          name: "ObraGest ${{ github.ref_name }}"
          body: |
            ## ObraGest ${{ github.ref_name }}

            ### Installation
            1. Download `ObraGest_${{ github.ref_name }}.zip`
            2. Extract the folder
            3. Run `ObraGest.exe` (accept UAC if prompted)
            4. If hosts cannot be written, the app opens **http://localhost:8080** automatically

            If Windows blocks the app (SmartScreen), choose **More info → Run anyway**.
            In **Configurações**, click **Conectar Google Drive** once to authorize.

            > Data is stored in `C:\Users\<your_user>\ObraGest\data\`
          files: backend/dist/ObraGest_${{ github.ref_name }}.zip
          draft: false
          prerelease: false
